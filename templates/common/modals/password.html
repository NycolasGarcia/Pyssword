<div class="modal fade" id="password_modal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <!-- BODY -->
      <div class="modal-body">

        <!-- PLATFORM -->
      <div class="mb-3">

        <!-- HEADER -->
        <div class="modal-header"> 
            <h5 class="modal-title fw-bold" id="passwordModalLabel"> 
                <i class="bi bi-key-fill text-warning"></i> 
            </h5> 
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> 
        </div>


        <!-- INPUT -->
        <div class="input-group mb-2">
          <input class="form-control" id="platformName" placeholder="GitHub, Netflix...">
          <input class="form-control" id="platformLink" placeholder="https://...">
        </div>

        <!-- LIST -->
        <div class="border rounded p-2" style="max-height: 180px; overflow-y: auto;" id="platformList">

          <!-- ITEM -->
          <div class="d-flex justify-content-between align-items-center py-1 border-bottom">
            <div class="text-truncate">
              <strong>GitHub</strong>
              <small class="text-muted d-block">https://github.com</small>
            </div>

            <div class="btn-group btn-group-sm">
              <button class="btn btn-outline-primary">
                <i class="bi bi-box-arrow-up-right"></i>
              </button>
              <button class="btn btn-outline-secondary">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>

        </div>

      </div>

        <!-- USERNAME -->
        <div class="mb-3">
          <label class="form-label">Username / Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input class="form-control" id="usernameField" placeholder="email or username">
            <button class="btn btn-outline-secondary" id="copyUsernameBtn">
              <i class="bi bi-clipboard"></i>
            </button>
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
          <label class="form-label">Generated password</label>
          <div class="input-group">
            <input class="form-control font-monospace" id="generatedPasswordDisplay">
            <button class="btn btn-outline-success" id="generatePasswordBtn">
              <i class="bi bi-arrow-repeat"></i>
            </button>
            <button class="btn btn-outline-primary" id="copyPasswordBtn">
              <i class="bi bi-files"></i>
            </button>
          </div>
        </div>

        <!-- PRESETS -->
        <div class="mb-3">
          <label class="form-label">Presets</label>
          <div class="btn-group w-100">
            <input type="radio" class="btn-check" name="preset" id="presetCode" checked>
            <label class="btn btn-outline-primary" for="presetCode"><i class="bi bi-shuffle"></i> Random</label>

            <input type="radio" class="btn-check" name="preset" id="presetPin">
            <label class="btn btn-outline-primary" for="presetPin"><i class="bi bi-lock-fill"></i> PIN</label>

            <input type="radio" class="btn-check" name="preset" id="presetWords">
            <label class="btn btn-outline-primary" for="presetWords"><i class="bi bi-lightbulb-fill"></i> Memorable</label>
          </div>
        </div>

        <!-- RULES -->
        <div class="mb-3">
          <label class="form-label">Character rules</label>

          <div class="form-check form-switch">
            <input class="form-check-input" id="ruleUpper" type="checkbox">
            <label class="form-check-label" for="ruleUpper">Capital letters</label>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" id="ruleNumbers" type="checkbox">
            <label class="form-check-label" for="ruleNumbers">Numbers</label>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" id="ruleSpecial" type="checkbox">
            <label class="form-check-label" for="ruleSpecial">Special chars</label>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" id="ruleDash" type="checkbox">
            <label class="form-check-label" for="ruleDash">Space → dash</label>
          </div>
        </div>

        <!-- LENGTH -->
        <div class="row g-2 mb-3">

        <label for="range4" class="form-label">Length: <output for="range4" id="rangeValue" aria-hidden="true"></output></label>
        <input type="range" class="form-range" min="0" max="25" value="50" id="range4">

            <script>
            // This is an example script, please modify as needed
            const rangeInput = document.getElementById('range4');
            const rangeOutput = document.getElementById('rangeValue');

            // Set initial value
            rangeOutput.textContent = rangeInput.value;

            rangeInput.addEventListener('input', function() {
                rangeOutput.textContent = this.value;
            });
            </script>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer justify-content-end">
        <button class="btn btn-outline-danger text-center" id="deleteAllFieldsBtn">
            <i class="bi bi-trash3-fill"></i>
        </button>
          <button class="btn btn-outline-primary" id="saveCurrentEntryBtn">
                <i class="bi bi-floppy-fill"></i>
          </button>
      </div>

    </div>
  </div>
</div>
